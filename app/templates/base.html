<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BonoApp</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
<div class="{% if user %}app-layout{% endif %}">
  {% if user %}
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-icon">📊</span>
      <span class="brand-name">BonoApp</span>
    </div>
    <nav class="sidebar-nav">
      <a href="/market" class="nav-item {% if active == 'market' %}active{% endif %}">
        <svg viewBox="0 0 20 20" fill="none"><polyline points="2,14 7,8 11,12 18,4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Mercado
      </a>
      <a href="/portfolio" class="nav-item {% if active == 'portfolio' %}active{% endif %}">
        <svg viewBox="0 0 20 20" fill="none"><rect x="3" y="7" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.6"/><path d="M7 7V5a3 3 0 016 0v2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        Cartera
      </a>
      <a href="/history" class="nav-item {% if active == 'history' %}active{% endif %}">
        <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.6"/><path d="M10 6v4l2.5 2.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        Historial
      </a>
      {% if user.role == 'admin' %}
      <a href="/admin/holdings" class="nav-item {% if active == 'admin' %}active{% endif %}">
        <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="7" r="3" stroke="currentColor" stroke-width="1.6"/><path d="M4 17c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        Admin
      </a>
      {% endif %}
    </nav>
    <div class="sidebar-footer">
      <span class="sidebar-user">{{ user.username }}</span>
      <form action="/logout" method="post">
        <button type="submit" class="btn-logout">
          <svg viewBox="0 0 20 20" fill="none"><path d="M13 10H3m0 0l3-3m-3 3l3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 5H15a2 2 0 012 2v6a2 2 0 01-2 2H9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          Salir
        </button>
      </form>
    </div>
  </aside>
  {% endif %}
  <main class="{% if user %}main-content{% endif %}">
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
