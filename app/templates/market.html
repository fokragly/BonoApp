{% extends "base.html" %}
{% block content %}

<div class="market-header">
  <h2>Bonos</h2>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 20 20" fill="none">
      <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.5"/>
      <path d="M14 14L17.5 17.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input type="text" id="search" class="search-input" placeholder="Buscar por ticker o nombre..."
           value="{{ q }}" name="q"
           hx-get="/market/partial"
           hx-trigger="keyup changed delay:300ms"
           hx-target="#bond-tbody"
           hx-include="this"
           autocomplete="off">
  </div>
</div>

{% if error %}
<div class="alert-error">⚠ {{ error }}</div>
{% endif %}

<div class="table-wrap">
  <table class="bonds-table" data-sortable>
    <thead>
      <tr>
        <th></th>
        <th data-sort="1">Especie</th>
        <th data-sort="2">Nombre</th>
        <th data-sort="3">Mon.</th>
        <th class="num" data-sort="4">Último</th>
        <th class="num" data-sort="5">Var. %</th>
        <th class="num" data-sort="6">Volumen</th>
        <th class="num" data-sort="7">TIR %</th>
        <th class="num" data-sort="8">Aper.</th>
        <th class="num" data-sort="9">Mínimo</th>
        <th class="num" data-sort="10">Máximo</th>
        <th class="num" data-sort="11">Mod. Duration</th>
        <th data-sort="12">Últ. Cot.</th>
        <th data-sort="13">Vencimiento</th>
      </tr>
    </thead>
    <tbody id="bond-tbody"
           hx-get="/market/partial"
           hx-trigger="every 900s"
           hx-swap="innerHTML">
      {% include "partials/bond_rows.html" %}
    </tbody>
  </table>
</div>
{% endblock %}
